<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- ダーク背景 -->
  <rect width="512" height="512" rx="112" fill="#0d0e12"/>
  
  <!-- グラデーションとエフェクトの定義 -->
  <defs>
    <linearGradient id="orbit-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d2ff" />
      <stop offset="100%" stop-color="#7928ca" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Lucideのorbitデザインをスケーリングして配置 (中央配置調整) -->
  <g transform="translate(64, 64) scale(16)" stroke="url(#orbit-grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)">
    <!-- 24x24のスペースで描画 (16倍スケールで中央384x384エリアにフィット) -->
    <circle cx="12" cy="12" r="3" fill="url(#orbit-grad)" fill-opacity="0.15" />
    <circle cx="19" cy="5" r="1.8" fill="#0d0e12" stroke-width="2" />
    <circle cx="5" cy="19" r="1.8" fill="#0d0e12" stroke-width="2" />
    <path d="M10.4 21.9a10 10 0 1 1 9.94-1.23"/>
    <path d="M1.1 18a10 10 0 0 1 18-12"/>
  </g>
</svg>
